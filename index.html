
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHUMI: Smart Farming Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        bhumi: {
                            dark: '#0F1419',
                            green: '#2D5016',
                            gold: '#D4AF37',
                            glass: 'rgba(255, 255, 255, 0.05)',
                            glassBorder: 'rgba(255, 255, 255, 0.1)',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'orb-pulse': 'orbPulse 4s ease-in-out infinite',
                        'orb-glow': 'orbGlow 2s ease-in-out infinite alternate',
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'slide-up': 'slideUp 0.5s ease-out forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        orbPulse: {
                            '0%, 100%': { transform: 'scale(1)', opacity: '0.8' },
                            '50%': { transform: 'scale(1.1)', opacity: '1' },
                        },
                        orbGlow: {
                            'from': { boxShadow: '0 0 20px #4ADE80, 0 0 40px #2D5016' },
                            'to': { boxShadow: '0 0 40px #4ADE80, 0 0 80px #2D5016' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            margin: 0;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* Glass Panel Base */
        .glass-panel {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }

        /* Light Mode - Enhanced Shadows & Borders for Visibility */
        html:not(.dark) .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(45, 80, 22, 0.1);
            box-shadow: 
                0 4px 6px -1px rgba(0, 0, 0, 0.05),
                0 10px 15px -3px rgba(45, 80, 22, 0.05);
        }

        html:not(.dark) .glass-panel:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 20px 25px -5px rgba(0, 0, 0, 0.05),
                0 10px 10px -5px rgba(45, 80, 22, 0.1);
            border-color: rgba(45, 80, 22, 0.2);
        }

        /* Dark Mode */
        .dark .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #2D5016;
            border-radius: 3px;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .dark .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #1a2e15 0%, #05080a 90%);
        }

        .light-animated-bg {
             position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 50%, #fefce8 100%);
        }
        
        .light-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: floatLight 25s infinite ease-in-out;
        }
        .orb-1 { width: 600px; height: 600px; background: #dcfce7; top: -100px; left: -100px; animation-delay: 0s; }
        .orb-2 { width: 500px; height: 500px; background: #fef9c3; bottom: -50px; right: -50px; animation-delay: -5s; }

        @keyframes floatLight {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.1); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .firefly {
            position: absolute;
            width: 3px;
            height: 3px;
            background-color: #D4AF37;
            border-radius: 50%;
            opacity: 0;
            box-shadow: 0 0 8px #D4AF37;
            animation: fly 20s linear infinite;
        }
        
        @keyframes fly {
            0% { transform: translate(0, 0); opacity: 0; }
            10% { opacity: 0.6; }
            50% { opacity: 0.3; }
            90% { opacity: 0.6; }
            100% { transform: translate(100px, -150px); opacity: 0; }
        }
        
        /* Voice Agent Orb */
        .magical-orb {
            background: radial-gradient(circle, #4ADE80 0%, #166534 60%, #052e16 100%);
            box-shadow: 0 0 30px #4ADE80, 0 0 60px #166534;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.32.0",
    "react/": "https://esm.sh/react@^19.2.1/",
    "react": "https://esm.sh/react@^19.2.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.1/",
    "lucide-react": "https://esm.sh/lucide-react@^0.559.0",
    "recharts": "https://esm.sh/recharts@^3.5.1",
    "firebase/app": "https://esm.sh/firebase@10.8.0/app",
    "firebase/auth": "https://esm.sh/firebase@10.8.0/auth",
    "firebase/firestore": "https://esm.sh/firebase@10.8.0/firestore"
  }
}
</script>
</head>
<body>
    <div class="light-animated-bg dark:hidden">
        <div class="light-orb orb-1"></div>
        <div class="light-orb orb-2"></div>
    </div>

    <div class="hidden dark:block animated-bg">
        <div class="gradient-orb bg-bhumi-green w-[800px] h-[800px] top-[-300px] left-[-200px] animate-pulse-slow absolute rounded-full filter blur-[100px] opacity-20"></div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>

    <script>
        const createParticles = () => {
            const darkContainer = document.querySelector('.animated-bg');
            if(darkContainer && darkContainer.children.length <= 2) {
                for(let i=0; i<15; i++) {
                    const fly = document.createElement('div');
                    fly.className = 'firefly';
                    fly.style.left = Math.random() * 100 + 'vw';
                    fly.style.top = Math.random() * 100 + 'vh';
                    fly.style.animationDelay = Math.random() * 10 + 's';
                    fly.style.animationDuration = (15 + Math.random() * 20) + 's';
                    darkContainer.appendChild(fly);
                }
            }
        };
        createParticles();
    </script>
</body>
</html>
